name: auto-approve

on:
  pull_request_target:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  approve:
    runs-on: ubuntu-latest
    name: Auto-Approve PR
    permissions:
      pull-requests: write
    steps:
      # GitHub blocks self-approval: a token cannot approve a PR opened by
      # the same identity that owns it. When the PR author is p6m7g8-automation
      # (the bot that owns P6_A_GH_TOKEN), use GITHUB_TOKEN (Actions actor)
      # to avoid the "cannot approve your own pull request" error.
      # Add additional bot logins to the condition as needed.
      - name: Auto-Approve PR (via GITHUB_TOKEN when bot is author)
        if: |
          github.event.pull_request.user.login == 'p6m7g8-automation' &&
          !github.event.pull_request.draft &&
          !contains(github.event.pull_request.labels.*.name, 'do-not-merge') &&
          contains(github.event.pull_request.labels.*.name, 'auto-approve')
        uses: hmarr/auto-approve-action@v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-Approve PR
        if: github.event.pull_request.user.login != 'p6m7g8-automation'
        uses: p6m7g8-actions/p6-gh-pr-auto-approve@main
        with:
          bot_token: ${{ secrets.P6_A_GH_TOKEN }}
